name: Temporary Source Scoping Lifecycle Audit

on:
  push:
    branches:
      - feature/project-source-scoping-v0.1

permissions:
  contents: write
  statuses: write

jobs:
  lifecycle-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/project-source-scoping-v0.1
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repository and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-socket

      - name: Preflight complete validation
        run: |
          python -m pytest tests/source_scoping -q
          python -m pytest tests/source_scoping/test_codex_audit_regressions.py -q
          python -m pytest -q
          python -m compileall -q src
          git diff --check 28a7d1dbb82bebb09e01a39f0191f085c7bf0354...HEAD

      - name: Create exact final commit without temporary workflow
        run: |
          git config user.name "continuity-source-scoping-audit"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/source-scoping-lifecycle-audit-temporary.yml
          git commit -m "Remove temporary lifecycle audit workflow"
          git push origin HEAD:feature/project-source-scoping-v0.1
          git fetch origin feature/project-source-scoping-v0.1
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/feature/project-source-scoping-v0.1)"
          test -z "$(git status --short)"

      - name: Run exact final checks and publish counted statuses
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          FINAL_SHA="$(git rev-parse HEAD)"
          API="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${FINAL_SHA}"

          post_status() {
            local context="$1"
            local state="$2"
            local description="$3"
            python - "$context" "$state" "$description" > /tmp/status.json <<'PY'
          import json
          import sys
          print(json.dumps({
              "state": sys.argv[2],
              "context": sys.argv[1],
              "description": sys.argv[3][:140],
          }))
          PY
            curl --fail --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "${API}" \
              --data-binary @/tmp/status.json >/dev/null
          }

          run_counted_pytest() {
            local base_context="$1"
            shift
            local safe_name="${base_context//\//-}"
            local xml="/tmp/${safe_name}.xml"
            set +e
            python -m pytest "$@" -q --junitxml="${xml}"
            local code=$?
            set -e
            local tests
            tests="$(python - "${xml}" <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          root = ET.parse(sys.argv[1]).getroot()
          suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
          print(sum(int(item.attrib.get("tests", 0)) for item in suites))
          PY
          )"
            if [ "${code}" -eq 0 ]; then
              post_status "${base_context}/${tests}-passed" success "${tests} tests passed"
            else
              post_status "${base_context}/${tests}-collected-failed" failure "pytest failed"
              exit "${code}"
            fi
          }

          run_counted_pytest source-scoping/tests tests/source_scoping
          run_counted_pytest source-scoping/audit-regressions tests/source_scoping/test_codex_audit_regressions.py
          run_counted_pytest backend/pytest

          python -m compileall -q src
          post_status python/compileall success "python -m compileall -q src passed"

          git diff --check 28a7d1dbb82bebb09e01a39f0191f085c7bf0354...HEAD
          post_status repository/diff-check success "git diff --check passed"

          test -z "$(git status --short)"
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/feature/project-source-scoping-v0.1)"
          post_status repository/head success "clean; local HEAD equals upstream"
